const vColor = (v) => v === "DIVERGENT" ? C.red : v === "PARTIAL" ? C.amber : C.green;
const vLight = (v) => v === "DIVERGENT" ? C.redLight : v === "PARTIAL" ? C.amberLight : C.greenLight;
const vBorder = (v) => v === "DIVERGENT" ? C.redBorder : v === "PARTIAL" ? C.amberBorder : C.greenBorder;
const vLeft = (v) => v === "DIVERGENT" ? C.red : v === "PARTIAL" ? C.amber : C.green;

function ConfBar({ v }) {
  const color = v >= 0.9 ? C.green : v >= 0.8 ? C.amber : C.red;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
      <div style={{ width: 80, height: 3, borderRadius: 2, background: C.border2, overflow: "hidden" }}>
        <div style={{ width: `${v * 100}%`, height: "100%", background: color, borderRadius: 2 }} />
      </div>
      <span style={{ fontFamily: C.mono, fontSize: 10, color: C.textDim }}>{Math.round(v * 100)}%</span>
    </div>
  );
}

function VerdictBadge({ verdict }) {
  const mapV = verdict === "INVALID" ? "DIVERGENT" : verdict === "AT RISK" ? "PARTIAL" : verdict;
  return (
    <span style={{ padding: "4px 10px", borderRadius: 4, fontFamily: C.mono, fontSize: 10, letterSpacing: "0.5px", fontWeight: 500, background: vLight(mapV), color: vColor(mapV), border: `1px solid ${vBorder(mapV)}` }}>
      {verdict}
    </span>
  );
}

function Label({ children, mt = 16 }) {
  return (
    <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, letterSpacing: "1.5px", textTransform: "uppercase", marginBottom: 6, marginTop: mt }}>
      {children}
    </div>
  );
}

function ChatTab() {
  const [messages, setMessages] = useState([{ role: "assistant", content: "Intelligence Chat is live. I have full access to all six findings, the evidence ledger, and every system query Verus executed on Project Meridian. Ask me anything about Atlas Climate Systems." }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = useCallback(async (text) => {
    const msg = text || input.trim();
    if (!msg || loading) return;
    setInput("");
    const updated = [...messages, { role: "user", content: msg }];
    setMessages(updated);
    setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, system: CHAT_CONTEXT, messages: updated.filter((_, i) => i > 0).map(m => ({ role: m.role, content: m.content })) }),
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "assistant", content: data.content?.[0]?.text || "Error." }]);
    } catch { setMessages(m => [...m, { role: "assistant", content: "Connection error." }]); }
    setLoading(false);
  }, [input, loading, messages]);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 300px", gap: 24, height: "calc(100vh - 200px)", minHeight: 500 }}>
      <div style={{ display: "flex", flexDirection: "column", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <div style={{ padding: "14px 20px", borderBottom: `1px solid ${C.border2}`, background: C.surface2, display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.green }} />
          <span style={{ fontFamily: C.mono, fontSize: 10, color: C.textDim, letterSpacing: "0.5px" }}>INTELLIGENCE CHAT · PROJECT MERIDIAN · ATLAS CLIMATE SYSTEMS</span>
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: 20, display: "flex", flexDirection: "column", gap: 16 }}>
          {messages.map((m, i) => (
            <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: m.role === "user" ? "flex-end" : "flex-start", gap: 4 }}>
              <span style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim }}>{m.role === "user" ? "DEAL TEAM" : "VERUS"}</span>
              <div style={{ maxWidth: "85%", padding: "12px 16px", borderRadius: m.role === "user" ? "12px 12px 4px 12px" : "12px 12px 12px 4px", background: m.role === "user" ? C.blueLight : C.surface2, border: `1px solid ${m.role === "user" ? C.blueBorder : C.border}`, fontSize: 13, color: m.role === "user" ? C.blue : C.textMuted, lineHeight: 1.6 }}>{m.content}</div>
            </div>
          ))}
          {loading && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 4 }}>
              <span style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim }}>VERUS</span>
              <div style={{ padding: "12px 16px", borderRadius: "12px 12px 12px 4px", background: C.surface2, border: `1px solid ${C.border}`, fontSize: 13, color: C.textDim }}>Querying evidence...</div>
            </div>
          )}
          <div ref={endRef} />
        </div>
        <div style={{ padding: "14px 20px", borderTop: `1px solid ${C.border2}`, background: C.surface2, display: "flex", gap: 12, alignItems: "flex-end" }}>
          <textarea style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px 14px", color: C.text, fontSize: 13, fontFamily: C.sans, outline: "none", resize: "none", lineHeight: 1.5 }} value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder="Ask anything about this engagement..." rows={2} />
          <button onClick={() => send()} disabled={loading} style={{ background: loading ? C.surface2 : C.headerBg, border: `1px solid ${loading ? C.border : C.headerBg}`, borderRadius: 6, padding: "10px 20px", color: loading ? C.textDim : "#fff", fontSize: 12, fontFamily: C.mono, cursor: loading ? "not-allowed" : "pointer", whiteSpace: "nowrap", fontWeight: 500 }}>{loading ? "..." : "SEND"}</button>
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, letterSpacing: "1.5px", marginBottom: 12 }}>SUGGESTED QUESTIONS</div>
          {SUGGESTED_QUESTIONS.map((q, i) => (
            <div key={i} onClick={() => send(q)} style={{ padding: "10px 12px", background: C.surface2, border: `1px solid ${C.border2}`, borderRadius: 6, fontSize: 12, color: C.textMuted, cursor: "pointer", lineHeight: 1.5, marginBottom: 8, transition: "all 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.background = C.blueLight; e.currentTarget.style.borderColor = C.blueBorder; e.currentTarget.style.color = C.blue; }}
              onMouseLeave={e => { e.currentTarget.style.background = C.surface2; e.currentTarget.style.borderColor = C.border2; e.currentTarget.style.color = C.textMuted; }}>{q}</div>
          ))}
        </div>
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, letterSpacing: "1.5px", marginBottom: 12 }}>CHAT RULES</div>
          {["All answers grounded in retrieved evidence", "Every answer cites its source finding", "No speculation beyond available data", "No acquisition recommendations", "Data gaps identified explicitly"].map((r, i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-start", marginBottom: 8 }}>
              <div style={{ width: 4, height: 4, borderRadius: "50%", background: C.green, marginTop: 6, flexShrink: 0 }} />
              <div style={{ fontSize: 12, color: C.textDim, lineHeight: 1.5 }}>{r}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

        )}

        {tab === "findings" && (
          <div>
            <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, letterSpacing: "2px", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
              <span>{divergent} DIVERGENT · {partial} PARTIAL · {FINDINGS.filter(f => f.verdict === "CONFIRMED").length} CONFIRMED</span>
              <div style={{ flex: 1, height: 1, background: C.border }} />
              <span style={{ whiteSpace: "nowrap" }}>ALL CHAINS VERIFIED INTACT</span>
            </div>
            {FINDINGS.map(f => <FindingCard key={f.id} f={f} />)}
          </div>
        )}

        {tab === "plan" && (
          <div>
            <div style={{ fontFamily: C.mono, fontSize: 9, color: C.textDim, letterSpacing: "2px", marginBottom: 20, display: "flex", alignItems: "center", gap: 12 }}>
              <span>100-DAY PLAN STRESS TEST · 3 OF 11 INITIATIVES ASSESSED</span>
              <div style={{ flex: 1, height: 1, background: C.border }} />
            </div>
            <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "16px 20px", marginBottom: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
              <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.7 }}>Apex Industrial Partners' 100-day plan uploaded January 17, 2026. Verus evaluated each initiative against operating evidence from 4 connected systems. 11 total initiatives assessed. 3 flagged for material concern. 8 initiatives clear — no conflict with system evidence.</div>
            </div>
            {PLAN_ITEMS.map(item => <PlanCard key={item.id} item={item} />)}
            <div style={{ background: C.greenLight, border: `1px solid ${C.greenBorder}`, borderRadius: 8, padding: "16px 20px" }}>
              <div style={{ fontFamily: C.mono, fontSize: 10, color: C.green, marginBottom: 8 }}>8 INITIATIVES NOT FLAGGED</div>
              <div style={{ fontSize: 12, color: C.green, lineHeight: 1.7 }}>P-01 (Memphis chiller capacity) · P-02 (Atlanta RTU optimization) · P-04 (ERP integration) · P-05 (service contract renewals) · P-06 (Atlanta workforce training) · P-08 (data center vertical) · P-09 (distributor rationalization) · P-10 (management incentive alignment) — no material conflict with system evidence found.</div>
            </div>
          </div>
        )}

        {tab === "chat" && <ChatTab />}

      </div>

      {/* Footer */}
      <div style={{ borderTop: `1px solid ${C.border}`, padding: "20px 32px", display: "flex", justifyContent: "space-between", alignItems: "center", background: C.surface2, marginTop: 32 }}>
        <div style={{ fontFamily: C.serif, fontSize: 16, color: C.textDim }}>Verus</div>
        <div style={{ fontFamily: C.mono, fontSize: 10, color: C.textDim }}>THE RESONANCE INSTITUTE, LLC · HUNTINGTON BEACH, CA</div>
        <a href="https://github.com/The-Resonance-Institute/verus-public" style={{ fontFamily: C.mono, fontSize: 10, color: C.blue, textDecoration: "none" }}>github.com/The-Resonance-Institute</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
